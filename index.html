<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 貼圖大師 Pro - 集合頁版</title>
    <style>
        :root { --primary: #00c300; --secondary: #1e90ff; --dark: #1a1a1a; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: #eaeff2; margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); overflow: hidden; }
        
        /* Tabs */
        .tabs { display: flex; background: var(--dark); }
        .tab { flex: 1; padding: 18px; text-align: center; color: #aaa; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 1.1em; }
        .tab.active { background: #333; color: var(--primary); border-bottom: 4px solid var(--primary); }
        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; }

        /* UI Elements */
        .card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        h2 { margin-top: 0; color: var(--dark); display: flex; align-items: center; gap: 10px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; color: #444; }
        input, select { padding: 12px; border: 2px solid #eee; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--secondary); outline: none; }
        
        .grid-config { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; }
        
        /* Sticker Text Manager */
        .text-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-top: 15px; }
        .text-box { display: flex; gap: 5px; background: #f1f3f5; padding: 8px; border-radius: 8px; align-items: center; }
        .text-box input { padding: 5px 8px; font-size: 14px; border: 1px solid #ccc; }
        
        /* Buttons */
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 18px; font-size: 1.2em; margin-top: 10px; }
        .btn-main:hover { background: #00a300; transform: translateY(-2px); }
        .btn-rand { background: #6c757d; color: white; padding: 5px 10px; font-size: 12px; }
        .btn-all-rand { background: #f39c12; color: white; margin-bottom: 15px; }
        .btn-del { background: #ff4757; color: white; padding: 5px 10px; }
        
        /* Output */
        #outputArea { background: #f8f9fa; border: 2px dashed var(--secondary); border-radius: 12px; padding: 20px; margin-top: 25px; }
        .copy-box { background: #fff; padding: 15px; border: 1px solid #eee; border-radius: 8px; font-family: monospace; position: relative; word-break: break-all; }
        
        /* Splitter */
        #dropZone { border: 3px dashed #cbd5e0; border-radius: 15px; padding: 50px; text-align: center; color: #718096; cursor: pointer; background: #edf2f7; }
        #dropZone:hover { background: #e2e8f0; border-color: var(--secondary); }
        #canvasContainer { margin-top: 20px; text-align: center; overflow: auto; }
        canvas { border: 1px solid #000; max-width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('genTab', this)">🚀 集合頁生圖指令</div>
        <div class="tab" onclick="switchTab('splitTab', this)">✂️ 圖片切割輸出</div>
    </div>

    <div id="genTab" class="tab-content active">
        <div class="card">
            <h2>🎨 貼圖角色與風格設定</h2>
            <div class="grid-config">
                <div>
                    <label>主角描述</label>
                    <input type="text" id="subject" placeholder="例如：一隻圓滾滾的藍色魟魚" oninput="saveData()">
                </div>
                <div>
                    <label>繪畫風格</label>
                    <select id="styleSelect" onchange="saveData()"></select>
                </div>
                <div>
                    <label>預計數量</label>
                    <input type="number" id="stickerCount" value="16" min="8" max="16" oninput="refreshTextGrid(); saveData()">
                </div>
            </div>
        </div>

        <div class="card">
            <h2>💬 貼圖文字管理</h2>
            <button class="btn-all-rand" onclick="randomizeAllTexts()">🎲 全部隨機填充</button>
            <div id="textContainer" class="text-grid"></div>
            <button class="btn-main" style="background:#34495e; margin-top: 20px;" onclick="addManualText()">➕ 新增一組自定義文字</button>
        </div>

        <button class="btn-main" onclick="generateSheetPrompt()">🔥 生成「集合頁」指令 (一次產出多組)</button>

        <div id="outputArea" style="display:none;">
            <label>✅ 請複製下方指令至 Midjourney / DALL-E 3：</label>
            <div class="copy-box" id="finalPrompt"></div>
            <p style="font-size: 13px; color: #666; margin-top: 10px;">💡 提示：此指令會引導 AI 生成 4x4 或 3x3 的網格大圖，方便後續直接切割。</p>
        </div>
    </div>

    <div id="splitTab" class="tab-content">
        <div class="card">
            <h2>✂️ 圖片自動切割器</h2>
            <div id="dropZone" onclick="document.getElementById('fileInput').click()">
                <p>📸 點擊或將 AI 生成的大圖拖放到這裡</p>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(this)">
            </div>
            
            <div class="grid-config" style="margin-top: 20px;">
                <div>
                    <label>切割方式</label>
                    <select id="gridType" onchange="updateGridFromType()">
                        <option value="4x4">4 x 4 (16張)</option>
                        <option value="3x3">3 x 3 (9張)</option>
                        <option value="4x2">4 x 2 (8張)</option>
                        <option value="custom">自定義行列</option>
                    </select>
                </div>
                <div>
                    <label>橫向(列)</label>
                    <input type="number" id="rows" value="4" oninput="updatePreview()">
                </div>
                <div>
                    <label>直向(行)</label>
                    <input type="number" id="cols" value="4" oninput="updatePreview()">
                </div>
            </div>

            <div id="canvasContainer">
                <canvas id="previewCanvas"></canvas>
            </div>
            
            <button id="dlBtn" class="btn-main" style="display:none; background: #e67e22;" onclick="downloadAll()">💾 一鍵導出所有圖片 (ZIP/批次)</button>
        </div>
    </div>
</div>

<script>
    // --- 資料庫 ---
    const styleOptions = [
        "Kawaii 2D Anime", "3D Disney Pixar Style", "Flat Vector Illustration", "Hand-drawn Crayon",
        "Pencil Sketch", "Minimalist Line Art", "Felt Wool / Needle Felt", "8-bit Pixel Art",
        "Claymation (黏土風)", "Watercolor Illustration", "Ukiyo-e Style", "Cyberpunk Sticker",
        "Pop Art", "Children's Book Illustration", "Oil Painting Texture", "Vintage 1930s Cartoon",
        "Stitch Embroidery", "Paper Cut-out Art", "Chalkboard Art", "Glass Texture", "Zentangle Patterns"
    ];

    const phraseBank = [
        "Hello!", "Good Morning", "Thank You", "Love You", "OK!", "Hahaha", "??", "Wait!",
        "I'm Tired", "Great!", "No!", "On my way", "Hurry Up", "Miss You", "Cry", "Angry",
        "Fighting!", "Good Night", "Surprise!", "Good Job", "Yum!", "Sorry", "Awesome", "OMG"
    ];

    // --- 初始化 ---
    window.onload = function() {
        const sSelect = document.getElementById('styleSelect');
        styleOptions.forEach(s => sSelect.add(new Option(s, s)));
        
        loadSavedData();
    };

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // --- 生圖邏輯 ---
    function refreshTextGrid() {
        const count = parseInt(document.getElementById('stickerCount').value);
        const container = document.getElementById('textContainer');
        const currentInputs = Array.from(document.querySelectorAll('.sticker-text')).map(i => i.value);
        
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
            createTextInput(currentInputs[i] || "");
        }
    }

    function createTextInput(val) {
        const div = document.createElement('div');
        div.className = 'text-box';
        div.innerHTML = `
            <input type="text" class="sticker-text" value="${val}" placeholder="文字..." oninput="saveData()">
            <button class="btn-rand" onclick="randOne(this)">🎲</button>
            <button class="btn-del" onclick="this.parentElement.remove(); saveData()">✕</button>
        `;
        document.getElementById('textContainer').appendChild(div);
    }

    function addManualText() { createTextInput(""); saveData(); }

    function randOne(btn) {
        const input = btn.previousElementSibling;
        input.value = phraseBank[Math.floor(Math.random() * phraseBank.length)];
        saveData();
    }

    function randomizeAllTexts() {
        const inputs = document.querySelectorAll('.sticker-text');
        let pool = [...phraseBank].sort(() => 0.5 - Math.random());
        inputs.forEach((input, i) => {
            input.value = pool[i % pool.length];
        });
        saveData();
    }

    function generateSheetPrompt() {
        const subject = document.getElementById('subject').value || "a cute character";
        const style = document.getElementById('styleSelect').value;
        const texts = Array.from(document.querySelectorAll('.sticker-text')).map(i => i.value).filter(v => v !== "");
        
        // 核心邏輯：生成 Sticker Sheet 指令
        const prompt = `**Sticker sheet set of multiple stickers**, ${style}, **${subject}**, featuring various poses and expressions including: (${texts.join(', ')}), white background, die-cut, vibrant colors, flat design, high resolution, organized in a clean grid --v 6.0 --tile`;
        
        document.getElementById('outputArea').style.display = 'block';
        document.getElementById('finalPrompt').innerText = prompt;
        saveData();
    }

    // --- 自動儲存 ---
    function saveData() {
        const data = {
            subject: document.getElementById('subject').value,
            style: document.getElementById('styleSelect').value,
            count: document.getElementById('stickerCount').value,
            texts: Array.from(document.querySelectorAll('.sticker-text')).map(i => i.value)
        };
        localStorage.setItem('sticker_master_data', JSON.stringify(data));
    }

    function loadSavedData() {
        const saved = JSON.parse(localStorage.getItem('sticker_master_data'));
        if (saved) {
            document.getElementById('subject').value = saved.subject || "";
            document.getElementById('styleSelect').value = saved.style || styleOptions[0];
            document.getElementById('stickerCount').value = saved.count || 16;
            document.getElementById('textContainer').innerHTML = '';
            saved.texts.forEach(t => createTextInput(t));
        } else {
            refreshTextGrid();
            randomizeAllTexts();
        }
    }

    // --- 切割邏輯 ---
    let sourceImg = new Image();
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');

    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                sourceImg.onload = () => {
                    document.getElementById('dlBtn').style.display = 'block';
                    updatePreview();
                };
                sourceImg.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateGridFromType() {
        const type = document.getElementById('gridType').value;
        if (type !== 'custom') {
            const [r, c] = type.split('x');
            document.getElementById('rows').value = r;
            document.getElementById('cols').value = c;
        }
        updatePreview();
    }

    function updatePreview() {
        if (!sourceImg.src) return;
        const r = parseInt(document.getElementById('rows').value);
        const c = parseInt(document.getElementById('cols').value);
        
        canvas.width = sourceImg.width;
        canvas.height = sourceImg.height;
        ctx.drawImage(sourceImg, 0, 0);

        ctx.strokeStyle = "rgba(255, 0, 0, 0.8)";
        ctx.lineWidth = Math.max(2, sourceImg.width / 200);
        const dw = canvas.width / c;
        const dh = canvas.height / r;

        for (let i = 1; i < c; i++) {
            ctx.beginPath(); ctx.moveTo(i * dw, 0); ctx.lineTo(i * dw, canvas.height); ctx.stroke();
        }
        for (let j = 1; j < r; j++) {
            ctx.beginPath(); ctx.moveTo(0, j * dh); ctx.lineTo(canvas.width, j * dh); ctx.stroke();
        }
    }

    async function downloadAll() {
        const r = parseInt(document.getElementById('rows').value);
        const c = parseInt(document.getElementById('cols').value);
        const dw = sourceImg.width / c;
        const dh = sourceImg.height / r;

        let count = 1;
        for (let i = 0; i < r; i++) {
            for (let j = 0; j < c; j++) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = dw;
                tempCanvas.height = dh;
                tempCanvas.getContext('2d').drawImage(sourceImg, j * dw, i * dh, dw, dh, 0, 0, dw, dh);
                
                const link = document.createElement('a');
                link.download = `sticker_${count.toString().padStart(2, '0')}.png`;
                link.href = tempCanvas.toDataURL("image/png");
                link.click();
                await new Promise(res => setTimeout(res, 300)); // 避免瀏覽器封鎖
                count++;
            }
        }
    }
</script>

</body>
</html>
