
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 貼圖全能工廠 Pro</title>
    <style>
        :root { --primary: #27ae60; --secondary: #3498db; --dark: #2c3e50; --bg: #f0f2f5; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* 分頁樣式 */
        .tabs { display: flex; background: var(--dark); }
        .tab { flex: 1; padding: 15px; text-align: center; color: white; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .tab.active { background: var(--primary); }
        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; }

        /* 通用元件 */
        h2 { border-left: 5px solid var(--primary); padding-left: 10px; margin-bottom: 20px; }
        .section { margin-bottom: 25px; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        button { cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; padding: 10px 20px; font-weight: bold; }
        
        /* 生圖分頁專用 */
        .btn-add { background: var(--primary); color: white; }
        .btn-gen { background: var(--secondary); color: white; width: 100%; font-size: 18px; padding: 15px; }
        .text-item { display: flex; gap: 10px; margin-bottom: 8px; }
        .btn-del { background: #e74c3c; color: white; }
        .prompt-card { background: #f8f9fa; border-left: 4px solid var(--secondary); padding: 15px; margin-bottom: 10px; position: relative; }
        
        /* 切割分頁專用 */
        #dropZone { border: 2px dashed #ccc; padding: 40px; text-align: center; color: #7f8c8d; border-radius: 10px; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        #dropZone:hover { border-color: var(--secondary); background: #f0f8ff; }
        #previewCanvas { max-width: 100%; height: auto; border: 1px solid #ccc; display: none; margin-top: 10px; }
        .split-controls { background: #f9f9f9; padding: 15px; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .split-controls div { flex: 1; min-width: 120px; }
        .btn-download { background: #e67e22; color: white; width: 100%; margin-top: 20px; font-size: 18px; }
        #resultThumbnails { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; margin-top: 15px; }
        .thumb-box { width: 100%; padding-bottom: 100%; position: relative; border: 1px solid #eee; }
        .thumb-box img { position: absolute; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="openTab('genTab', this)">✨ 生圖指令產生器</div>
        <div class="tab" onclick="openTab('splitTab', this)">✂️ 圖片自動切割</div>
    </div>

    <div id="genTab" class="tab-content active">
        <h2>貼圖靈感配置</h2>
        <div class="section">
            <label>角色描述 (AI 會根據此描述繪製主體)</label>
            <input type="text" id="subject" placeholder="例如：一隻戴著墨鏡的粉紅魟魚">
        </div>

        <div class="grid-2">
            <div>
                <label>繪畫風格 (20+ 選項)</label>
                <select id="styleSelect"></select>
            </div>
            <div>
                <label>生成數量 (8-16)</label>
                <input type="number" id="stickerCount" min="8" max="16" value="8">
            </div>
        </div>

        <div class="section">
            <label>貼圖文字管理 (自動儲存)</label>
            <div id="textContainer"></div>
            <button class="btn-add" onclick="addNewText()">＋ 新增文字組</button>
        </div>

        <button class="btn-gen" onclick="generatePrompts()">🚀 批次生成 AI 指令</button>

        <div id="promptOutput" style="margin-top: 20px; display: none;">
            <h3>指令清單 (複製到 Midjourney / DALL-E)</h3>
            <div id="promptsList"></div>
        </div>
    </div>

    <div id="splitTab" class="tab-content">
        <h2>圖片切割器 (貼圖打包準備)</h2>
        <div id="dropZone" onclick="document.getElementById('fileInput').click()">
            <p>📁 點擊或拖放圖片至此 (支援 JPG / PNG)</p>
            <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(this)">
        </div>

        <div class="split-controls">
            <div>
                <label>快速設定</label>
                <select onchange="quickSet(this.value)">
                    <option value="custom">自定義</option>
                    <option value="3x3">3 x 3 (9宮格)</option>
                    <option value="4x4">4 x 4 (16份)</option>
                    <option value="4x2">4 x 2 (8份)</option>
                </select>
            </div>
            <div>
                <label>橫向切割 (行)</label>
                <input type="number" id="rows" value="3" min="1">
            </div>
            <div>
                <label>直向切割 (列)</label>
                <input type="number" id="cols" value="3" min="1">
            </div>
            <button class="btn-add" onclick="updatePreview()" style="height: 40px;">更新預覽</button>
        </div>

        <div style="text-align: center; margin-top: 15px;">
            <canvas id="previewCanvas"></canvas>
            <div id="resultThumbnails"></div>
        </div>

        <button id="downloadBtn" class="btn-download" style="display:none;" onclick="downloadAll()">💾 一鍵輸出所有切片檔</button>
    </div>
</div>

<script>
    // --- 共用與分頁邏輯 ---
    function openTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    }

    // --- 生圖邏輯 ---
    const styles = [
        "美式復古卡通 (Vintage Cartoon)", "日系療癒動漫 (Kawaii Anime)", "3D 黏土人 (Claymation Style)",
        "3D 迪士尼風 (Disney Pixer Style)", "粉蠟筆手繪 (Crayon Doodle)", "細膩鉛筆素描 (Pencil Sketch)",
        "透明系水彩 (Watercolor Painting)", "8-bit 像素藝術 (Pixel Art)", "賽博龐克 (Cyberpunk)",
        "極簡線條畫 (Minimalist Line Art)", "羊毛氈質感 (Felted Wool Texture)", "刺繡風 (Embroidery Art)",
        "粉彩夢幻風 (Pastel Dreamy)", "中式水墨 (Ink Wash)", "Ukiyo-e 浮世繪", "普普藝術 (Pop Art)",
        "樂高積木風 (Lego Style)", "寫實微縮模型 (Miniature Food)", "油畫質感 (Oil Texture)",
        "黑板粉筆畫 (Chalkboard)", "萬聖節哥德 (Gothic Cute)", "拼貼藝術 (Paper Collage)", "螢光霓虹 (Neon Art)"
    ];

    const defaultTexts = ["Hello!", "Thank You ❤️", "OK!", "Hahaha 😂", "Cry... 😭", "Good Night 🌙", "Angry! 💢", "Fighting! 🔥"];

    window.onload = function() {
        // 初始化風格
        const s = document.getElementById('styleSelect');
        styles.forEach(item => s.add(new Option(item, item)));
        
        // 讀取生圖設定
        loadGenData();
    };

    function loadGenData() {
        document.getElementById('subject').value = localStorage.getItem('s_subject') || "";
        document.getElementById('styleSelect').value = localStorage.getItem('s_style') || styles[0];
        document.getElementById('stickerCount').value = localStorage.getItem('s_count') || 8;
        const savedTexts = JSON.parse(localStorage.getItem('s_texts')) || defaultTexts;
        savedTexts.forEach(t => renderTextInput(t));
    }

    function renderTextInput(val) {
        const div = document.createElement('div');
        div.className = 'text-item';
        div.innerHTML = `<input type="text" class="sticker-text" value="${val}"><button class="btn-del" onclick="this.parentElement.remove()">刪除</button>`;
        document.getElementById('textContainer').appendChild(div);
    }

    function addNewText() { renderTextInput(""); }

    function generatePrompts() {
        const subject = document.getElementById('subject').value || "A cute character";
        const style = document.getElementById('styleSelect').value;
        const count = document.getElementById('stickerCount').value;
        const texts = Array.from(document.querySelectorAll('.sticker-text')).map(i => i.value);
        
        // 儲存
        localStorage.setItem('s_subject', subject);
        localStorage.setItem('s_style', style);
        localStorage.setItem('s_count', count);
        localStorage.setItem('s_texts', JSON.stringify(texts));

        const list = document.getElementById('promptsList');
        list.innerHTML = '';
        document.getElementById('promptOutput').style.display = 'block';

        for (let i = 0; i < count; i++) {
            const t = texts[i] || "Surprise";
            const prompt = `[LINE Sticker], ${style}, ${subject}, expressive "${t}", white background, die-cut, 8k --v 6.0`;
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.innerHTML = `<strong>貼圖 ${i+1}:</strong><br>${prompt}`;
            list.appendChild(card);
        }
    }

    // --- 切割邏輯 ---
    let sourceImg = new Image();
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');

    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                sourceImg.onload = function() {
                    canvas.style.display = 'block';
                    updatePreview();
                    document.getElementById('downloadBtn').style.display = 'block';
                };
                sourceImg.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function quickSet(val) {
        if (val === 'custom') return;
        const parts = val.split('x');
        document.getElementById('rows').value = parts[0];
        document.getElementById('cols').value = parts[1];
        updatePreview();
    }

    function updatePreview() {
        if (!sourceImg.src) return;
        const rows = parseInt(document.getElementById('rows').value);
        const cols = parseInt(document.getElementById('cols').value);
        
        canvas.width = sourceImg.width;
        canvas.height = sourceImg.height;
        ctx.drawImage(sourceImg, 0, 0);

        // 畫切割線
        ctx.strokeStyle = "red";
        ctx.lineWidth = 5;
        const dw = canvas.width / cols;
        const dh = canvas.height / rows;

        for (let i = 1; i < cols; i++) {
            ctx.beginPath(); ctx.moveTo(i * dw, 0); ctx.lineTo(i * dw, canvas.height); ctx.stroke();
        }
        for (let j = 1; j < rows; j++) {
            ctx.beginPath(); ctx.moveTo(0, j * dh); ctx.lineTo(canvas.width, j * dh); ctx.stroke();
        }
    }

    async function downloadAll() {
        const rows = parseInt(document.getElementById('rows').value);
        const cols = parseInt(document.getElementById('cols').value);
        const dw = sourceImg.width / cols;
        const dh = sourceImg.height / rows;

        let count = 1;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = dw;
                tempCanvas.height = dh;
                const tempCtx = tempCanvas.getContext('2d');
                
                tempCtx.drawImage(sourceImg, c * dw, r * dh, dw, dh, 0, 0, dw, dh);
                
                const link = document.createElement('a');
                link.download = `sticker_${count.toString().padStart(2, '0')}.png`;
                link.href = tempCanvas.toDataURL("image/png");
                link.click();
                
                // 稍微延遲避免瀏覽器阻擋大量下載
                await new Promise(resolve => setTimeout(resolve, 200));
                count++;
            }
        }
        alert(`已嘗試下載 ${count-1} 張圖片，請確認瀏覽器是否允許「多重檔案下載」。`);
    }
</script>

</body>
</html>
