<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 貼圖大師 v7.3 - 精準去背與全域裁切版</title>
    <style>
        :root { --primary: #00c300; --secondary: #1e90ff; --dark: #1a1a1a; --accent: #ff4757; }
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: #eaeff2; margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); overflow: hidden; }
        
        .tabs { display: flex; background: var(--dark); }
        .tab { flex: 1; padding: 18px; text-align: center; color: #aaa; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .tab.active { background: #333; color: var(--primary); border-bottom: 4px solid var(--primary); }
        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; }

        .card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        h2 { margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 1.2em; }
        label { font-weight: 600; display: block; margin-bottom: 8px; color: #444; }
        input, select { padding: 12px; border: 2px solid #eee; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 15px; }
        
        .grid-config { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; }
        .text-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 15px; }
        .text-box { display: flex; gap: 5px; background: #f1f3f5; padding: 8px; border-radius: 8px; align-items: center; }
        .text-box input { padding: 5px 8px; font-size: 14px; border: 1px solid #ccc; background: white; flex: 1; }
        
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 18px; font-size: 1.1em; margin-top: 10px; }
        .btn-main:hover { background: #00a300; transform: translateY(-2px); }
        .btn-rand { background: #6c757d; color: white; padding: 5px 10px; font-size: 12px; }
        .btn-all-rand { background: #f39c12; color: white; padding: 10px 20px; margin-bottom: 10px; }
        .btn-del { background: var(--accent); color: white; padding: 5px 10px; }
        
        #dropZone { border: 3px dashed #cbd5e0; border-radius: 15px; padding: 40px; text-align: center; color: #718096; cursor: pointer; background: #edf2f7; }
        #canvasContainer { margin-top: 20px; text-align: center; position: relative; background-image: conic-gradient(#eee 25%, white 0 50%, #eee 0 75%, white 0); background-size: 20px 20px; border: 1px solid #ccc; }
        canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        
        .control-group { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #eee; }
        .crop-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #fffde7; padding: 15px; border-radius: 8px; border: 1px solid #fff9c4; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('genTab', this)">🚀 1. 生成無框指令</div>
        <div class="tab" onclick="switchTab('splitTab', this)">✂️ 2. 全域裁切與去背</div>
    </div>

    <div id="genTab" class="tab-content active">
        <div class="card">
            <h2>🎨 貼圖設定</h2>
            <div class="grid-config">
                <div style="grid-column: span 1;"><label>主角描述</label><input type="text" id="subject" placeholder="例如：一隻戴墨鏡的魟魚" oninput="saveData()"></div>
                <div><label>語系</label><select id="langSelect" onchange="saveData()"><option value="zh">繁體中文</option><option value="en">English</option><option value="jp">日本語</option></select></div>
                <div><label>風格</label><select id="styleSelect" onchange="saveData()"></select></div>
                <div><label>張數</label><input type="number" id="stickerCount" value="16" min="8" max="16" oninput="refreshTextGrid(); saveData()"></div>
            </div>
        </div>
        <div class="card">
            <h2>💬 貼圖文字與表情</h2>
            <button class="btn-all-rand" onclick="randomizeAllTexts()">🎲 依語言隨機填充</button>
            <div id="textContainer" class="text-grid"></div>
        </div>
        <button class="btn-main" onclick="generateSheetPrompt()">🔥 生成指令</button>
        <div id="outputArea" style="display:none; margin-top:20px;">
            <div id="finalPrompt" style="background: #f8f9fa; padding: 15px; border-radius: 8px; font-family: monospace; word-break: break-all; border: 1px solid #ddd;"></div>
            <button class="btn-main" style="background: var(--secondary);" onclick="copyToClipboard()">📋 一鍵複製指令</button>
        </div>
    </div>

    <div id="splitTab" class="tab-content">
        <div class="card">
            <h2>📏 步驟 1：調整大圖全域裁切</h2>
            <div id="dropZone"><p>📸 點擊或拖放 AI 生成的大圖到這裡</p><input type="file" id="fileInput" hidden accept="image/*"></div>
            
            <div class="crop-controls" style="margin-top: 15px;">
                <div><label>上裁切 (px)</label><input type="number" id="cropTop" value="0" oninput="updatePreview()"></div>
                <div><label>下裁切 (px)</label><input type="number" id="cropBottom" value="0" oninput="updatePreview()"></div>
                <div><label>左裁切 (px)</label><input type="number" id="cropLeft" value="0" oninput="updatePreview()"></div>
                <div><label>右裁切 (px)</label><input type="number" id="cropRight" value="0" oninput="updatePreview()"></div>
            </div>

            <h2 style="margin-top:20px;">✂️ 步驟 2：分割與去背設定</h2>
            <div class="control-group">
                <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 150px;"><label>列數 (Rows)</label><input type="number" id="rows" value="4" oninput="updatePreview()"></div>
                    <div style="flex: 1; min-width: 150px;"><label>行數 (Cols)</label><input type="number" id="cols" value="4" oninput="updatePreview()"></div>
                    <div style="flex: 2; min-width: 250px; background: #e3f2fd; padding: 10px; border-radius: 8px;">
                        <label>去背容差 (Tolerance: <span id="tolVal">25</span>)</label>
                        <input type="range" id="tolerance" min="1" max="100" value="25" oninput="document.getElementById('tolVal').innerText=this.value">
                        <small style="color: #555;">(若去背不乾淨請調大，若貼圖被挖空請調小)</small>
                    </div>
                </div>
                <button class="btn-main" style="background: var(--accent);" onclick="processRemoveBackground()">✨ 執行一鍵智慧去背</button>
            </div>

            <div id="canvasContainer"><canvas id="previewCanvas"></canvas></div>
            <button id="dlBtn" class="btn-main" style="display:none; background: #e67e22;" onclick="downloadAll()">💾 依裁切範圍分割並下載</button>
        </div>
    </div>
</div>

<script>
    // --- 基礎資料 (完全保留) ---
    const styleOptions = ["Kawaii 2D Anime", "3D Disney Pixar Style", "Flat Vector", "Hand-drawn Crayon", "Felt Wool Art", "Watercolor", "Vintage Cartoon"];
    const phraseBanks = {
        zh: ["你好! 👋", "謝謝 ❤️", "愛你 😘", "OK! 👌", "哈哈哈 😂", "?? ❓", "等一下 ✋", "好累 😴", "太棒了 ✨", "不要 ❌"],
        en: ["Hello! 👋", "Thanks ❤️", "Love ya 😘", "OK! 👌", "LOL 😂", "?? ❓", "Wait ✋", "Tired 😴"],
        jp: ["こんにちは 👋", "ありがとう ❤️", "愛してる 😘", "了解! 👌", "笑 😂", "?? ❓"]
    };

    window.onload = () => {
        const sSelect = document.getElementById('styleSelect');
        styleOptions.forEach(s => sSelect.add(new Option(s, s)));
        loadSavedData();
        setupDragAndDrop();
    };

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // --- 第一頁功能 (保留) ---
    function refreshTextGrid() {
        const count = document.getElementById('stickerCount').value;
        const container = document.getElementById('textContainer');
        const current = Array.from(document.querySelectorAll('.sticker-text')).map(i => i.value);
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const div = document.createElement('div');
            div.className = 'text-box';
            div.innerHTML = `<input type="text" class="sticker-text" value="${current[i] || ""}" oninput="saveData()"><button class="btn-rand" onclick="randOne(this)">🎲</button>`;
            container.appendChild(div);
        }
    }

    function randOne(btn) {
        const lang = document.getElementById('langSelect').value;
        const pool = phraseBanks[lang];
        btn.previousElementSibling.value = pool[Math.floor(Math.random() * pool.length)];
        saveData();
    }

    function randomizeAllTexts() {
        const lang = document.getElementById('langSelect').value;
        const inputs = document.querySelectorAll('.sticker-text');
        let pool = [...phraseBanks[lang]].sort(() => 0.5 - Math.random());
        inputs.forEach((input, i) => { input.value = pool[i % pool.length]; });
        saveData();
    }

    function generateSheetPrompt() {
        const subject = document.getElementById('subject').value || "character";
        const style = document.getElementById('styleSelect').value;
        const texts = Array.from(document.querySelectorAll('.sticker-text')).map(i => i.value).filter(v => v !== "");
        const prompt = `**Sticker sheet set**, 4x4 grid, **${style} style**, **${subject}**, expressions: (${texts.join(', ')}). White background, no lines, no frames, die-cut --v 6.0`;
        document.getElementById('outputArea').style.display = 'block';
        document.getElementById('finalPrompt').innerText = prompt;
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(document.getElementById('finalPrompt').innerText).then(() => alert("指令已複製！"));
    }

    function saveData() {
        const data = { subject: document.getElementById('subject').value, style: document.getElementById('styleSelect').value, texts: Array.from(document.querySelectorAll('.sticker-text')).map(i => i.value) };
        localStorage.setItem('sticker_v7_data', JSON.stringify(data));
    }

    function loadSavedData() {
        const saved = JSON.parse(localStorage.getItem('sticker_v7_data'));
        if (saved) {
            document.getElementById('subject').value = saved.subject || "";
            document.getElementById('textContainer').innerHTML = '';
            saved.texts.forEach(t => {
                const div = document.createElement('div');
                div.className = 'text-box';
                div.innerHTML = `<input type="text" class="sticker-text" value="${t}" oninput="saveData()"><button class="btn-rand" onclick="randOne(this)">🎲</button>`;
                document.getElementById('textContainer').appendChild(div);
            });
        } else { refreshTextGrid(); randomizeAllTexts(); }
    }

    // --- 第二頁功能：全域裁切與精準去背 (核心邏輯) ---
    let sourceImg = new Image();
    let originalCanvas = document.createElement('canvas'); // 存放去背後的圖
    let originalCtx = originalCanvas.getContext('2d', { willReadFrequently: true });
    const previewCanvas = document.getElementById('previewCanvas');
    const previewCtx = previewCanvas.getContext('2d');

    function setupDragAndDrop() {
        const dz = document.getElementById('dropZone');
        dz.onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => handleFiles(e.target.files);
        dz.ondragover = (e) => { e.preventDefault(); dz.style.borderColor = "var(--primary)"; };
        dz.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
    }

    function handleFiles(files) {
        if (files && files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                sourceImg.onload = () => {
                    originalCanvas.width = sourceImg.width;
                    originalCanvas.height = sourceImg.height;
                    originalCtx.drawImage(sourceImg, 0, 0);
                    document.getElementById('dlBtn').style.display = 'block';
                    updatePreview();
                };
                sourceImg.src = e.target.result;
            };
            reader.readAsDataURL(files[0]);
        }
    }

    // 💡 智慧去背：採用 Flood Fill 演算法從角落掃描，解決破圖問題
    function processRemoveBackground() {
        if (!sourceImg.src) return;
        const width = originalCanvas.width;
        const height = originalCanvas.height;
        const imageData = originalCtx.getImageData(0, 0, width, height);
        const data = imageData.data;
        const tolerance = parseInt(document.getElementById('tolerance').value);
        
        // 從四個邊緣點發動種子填充
        const seeds = [[0,0], [width-1, 0], [0, height-1], [width-1, height-1]];
        const visited = new Uint8Array(width * height);
        const stack = [...seeds];

        // 基準顏色 (假設背景接近純白)
        const targetR = 255, targetG = 255, targetB = 255;

        while (stack.length > 0) {
            const [x, y] = stack.pop();
            const idx = y * width + x;
            if (visited[idx]) continue;
            visited[idx] = 1;

            const p = idx * 4;
            // 判斷顏色是否接近背景色且非透明
            if (Math.abs(data[p] - targetR) < tolerance && 
                Math.abs(data[p+1] - targetG) < tolerance && 
                Math.abs(data[p+2] - targetB) < tolerance) {
                
                data[p+3] = 0; // 設為透明

                // 檢查相鄰像素
                if (x > 0) stack.push([x - 1, y]);
                if (x < width - 1) stack.push([x + 1, y]);
                if (y > 0) stack.push([x, y - 1]);
                if (y < height - 1) stack.push([x, y + 1]);
            }
        }
        originalCtx.putImageData(imageData, 0, 0);
        updatePreview();
        alert("智慧去背完成！");
    }

    function updatePreview() {
        if (!sourceImg.src) return;
        const r = parseInt(document.getElementById('rows').value);
        const c = parseInt(document.getElementById('cols').value);
        const cropT = parseInt(document.getElementById('cropTop').value) || 0;
        const cropB = parseInt(document.getElementById('cropBottom').value) || 0;
        const cropL = parseInt(document.getElementById('cropLeft').value) || 0;
        const cropR = parseInt(document.getElementById('cropRight').value) || 0;

        previewCanvas.width = originalCanvas.width;
        previewCanvas.height = originalCanvas.height;
        previewCtx.drawImage(originalCanvas, 0, 0);

        // 繪製裁切遮罩
        previewCtx.fillStyle = "rgba(0,0,0,0.5)";
        previewCtx.fillRect(0, 0, previewCanvas.width, cropT);
        previewCtx.fillRect(0, previewCanvas.height - cropB, previewCanvas.width, cropB);
        previewCtx.fillRect(0, cropT, cropL, previewCanvas.height - cropT - cropB);
        previewCtx.fillRect(previewCanvas.width - cropR, cropT, cropR, previewCanvas.height - cropT - cropB);

        // 計算有效區域並畫分割線
        const effW = previewCanvas.width - cropL - cropR;
        const effH = previewCanvas.height - cropT - cropB;
        if (effW > 0 && effH > 0) {
            previewCtx.strokeStyle = "red";
            previewCtx.lineWidth = 2;
            const dw = effW / c;
            const dh = effH / r;
            for (let i = 1; i < c; i++) {
                previewCtx.beginPath(); previewCtx.moveTo(cropL + i * dw, cropT);
                previewCtx.lineTo(cropL + i * dw, cropT + effH); previewCtx.stroke();
            }
            for (let j = 1; j < r; j++) {
                previewCtx.beginPath(); previewCtx.moveTo(cropL, cropT + j * dh);
                previewCtx.lineTo(cropL + effW, cropT + j * dh); previewCtx.stroke();
            }
        }
    }

    async function downloadAll() {
        const r = parseInt(document.getElementById('rows').value);
        const c = parseInt(document.getElementById('cols').value);
        const cropT = parseInt(document.getElementById('cropTop').value) || 0;
        const cropB = parseInt(document.getElementById('cropBottom').value) || 0;
        const cropL = parseInt(document.getElementById('cropLeft').value) || 0;
        const cropR = parseInt(document.getElementById('cropRight').value) || 0;

        const effW = originalCanvas.width - cropL - cropR;
        const effH = originalCanvas.height - cropT - cropB;
        const dw = effW / c;
        const dh = effH / r;

        if(!confirm(`即將導出 ${r*c} 張貼圖。順序：先按裁切邊界縮減大圖，再等距分割。`)) return;

        let count = 1;
        for (let i = 0; i < r; i++) {
            for (let j = 0; j < c; j++) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = dw; tempCanvas.height = dh;
                const tempCtx = tempCanvas.getContext('2d');
                // 從有效區域座標擷取
                tempCtx.drawImage(originalCanvas, cropL + j * dw, cropT + i * dh, dw, dh, 0, 0, dw, dh);
                const link = document.createElement('a');
                link.download = `sticker_${count.toString().padStart(2, '0')}.png`;
                link.href = tempCanvas.toDataURL("image/png");
                link.click();
                await new Promise(res => setTimeout(res, 400));
                count++;
            }
        }
    }
</script>
</body>
</html>
